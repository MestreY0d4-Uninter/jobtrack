name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobtrack
          POSTGRES_PASSWORD: jobtrack_dev_password
          POSTGRES_DB: jobtrack_ads
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobtrack -d jobtrack_ads"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://jobtrack:jobtrack_dev_password@localhost:5432/jobtrack_ads?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:deploy -w apps/api

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
