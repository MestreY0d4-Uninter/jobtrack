services:
  db:
    image: postgres:16-alpine
    container_name: jobtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobtrack_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jobtrack}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - jobtrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobtrack} -d ${POSTGRES_DB:-jobtrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jobtrack_postgres_data:
